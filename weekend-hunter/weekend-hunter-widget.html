<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekend Hunter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }
  .header { background: #1a1a2e; padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #e94560; }
  .header h1 { font-size: 16px; color: #e94560; letter-spacing: 1px; text-transform: uppercase; }
  .header .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
  .controls { display: flex; gap: 8px; padding: 10px 16px; background: #111; border-bottom: 1px solid #222; }
  .btn { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
  .btn-update { background: #e94560; color: #fff; }
  .btn-update:hover { background: #c73652; }
  .btn-route  { background: #1565c0; color: #fff; }
  .btn-route:hover  { background: #0d47a1; }
  .btn-clear  { background: #333; color: #aaa; }
  .btn-clear:hover  { background: #444; }
  .stats { display: flex; gap: 12px; padding: 8px 16px; background: #0a0a0a; font-size: 11px; color: #777; border-bottom: 1px solid #1a1a1a; flex-wrap: wrap; }
  .stat { display: flex; gap: 4px; }
  .stat-val { color: #e94560; font-weight: 700; }
  .tabs { display: flex; border-bottom: 1px solid #222; background: #111; }
  .tab { padding: 8px 14px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: #777; transition: all 0.2s; }
  .tab.active { color: #e94560; border-bottom-color: #e94560; }
  .content { overflow-y: auto; height: calc(100vh - 170px); padding: 10px; }
  .listing-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; transition: border-color 0.2s; }
  .listing-card:hover { border-color: #e94560; }
  .listing-card.watchlist { border-left: 3px solid #ffd600; }
  .listing-card.top-flip  { border-left: 3px solid #4caf50; }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #fff; }
  .card-meta  { font-size: 11px; color: #777; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
  .card-meta span { display: flex; align-items: center; gap: 3px; }
  .score-badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .score-high  { background: #4caf50; color: #000; }
  .score-mid   { background: #ff9800; color: #000; }
  .score-low   { background: #555; color: #ccc; }
  .watch-badge { background: #ffd600; color: #000; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .card-actions { display: flex; gap: 6px; margin-top: 6px; }
  .card-link { font-size: 11px; color: #1565c0; text-decoration: none; }
  .card-link:hover { color: #42a5f5; text-decoration: underline; }
  .empty-state { text-align: center; padding: 40px 20px; color: #444; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 16px; right: 16px; background: #1a1a2e; border: 1px solid #e94560; color: #e0e0e0; padding: 10px 16px; border-radius: 8px; font-size: 12px; opacity: 0; transition: opacity 0.3s; z-index: 999; }
  .toast.show { opacity: 1; }
  .route-link { display: block; background: #0d47a1; color: #fff; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .route-link:hover { background: #1565c0; }
</style>
</head>
<body>
<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <h1>🗺️ Weekend Hunter</h1>
  <span id="lastUpdate" style="font-size:10px; color:#555; margin-left:auto;"></span>
</div>

<div class="controls">
  <button class="btn btn-update" onclick="runDelta()">⟳ Update Now</button>
  <button class="btn btn-route"  onclick="openRoute()">🗺 Open Route</button>
  <button class="btn btn-clear"  onclick="clearResults()">✕ Clear</button>
</div>

<div class="stats">
  <div class="stat">Total: <span class="stat-val" id="statTotal">—</span></div>
  <div class="stat">Top Sales: <span class="stat-val" id="statSales">—</span></div>
  <div class="stat">Top Flips: <span class="stat-val" id="statFlips">—</span></div>
  <div class="stat">Watchlist: <span class="stat-val" id="statWatch">—</span></div>
  <div class="stat">New: <span class="stat-val" id="statNew">—</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('sales',this)">Garage Sales</div>
  <div class="tab" onclick="switchTab('flips',this)">eBay Flips</div>
  <div class="tab" onclick="switchTab('watchlist',this)">Watchlist</div>
  <div class="tab" onclick="switchTab('all',this)">All</div>
</div>

<div class="content" id="content">
  <div class="empty-state">
    <h3>🏷️</h3>
    <p>Run a full scrape on Friday night,<br>or hit Update Now to grab fresh listings.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const HUNTER_DIR = "G:/My Drive/Projects/_studio/weekend-hunter/";
let allListings = [];
let currentTab = "sales";

async function loadResults() {
  try {
    const resp = await fetch("hunt-results.json?t=" + Date.now());
    if (!resp.ok) return [];
    return await resp.json();
  } catch { return []; }
}

async function loadDelta() {
  try {
    const resp = await fetch("hunt-delta.json?t=" + Date.now());
    if (!resp.ok) return null;
    return await resp.json();
  } catch { return null; }
}

async function loadMapsUrl() {
  try {
    const resp = await fetch("maps-url.txt?t=" + Date.now());
    if (!resp.ok) return null;
    return await resp.text();
  } catch { return null; }
}

function scoreBadge(score) {
  const cls = score >= 8 ? "score-high" : score >= 6 ? "score-mid" : "score-low";
  return `<span class="score-badge ${cls}">${score}/10</span>`;
}

function renderCard(l) {
  const isWatch = l.watchlist_flag;
  const isFlip  = l.flip_score >= 7;
  let cls = "listing-card";
  if (isWatch) cls += " watchlist";
  else if (isFlip) cls += " top-flip";

  const saleScore = l.sale_score != null ? `Sale: ${scoreBadge(l.sale_score)}` : "";
  const flipScore = l.flip_score != null ? `Flip: ${scoreBadge(l.flip_score)}` : "";
  const watchBadge = isWatch ? `<span class="watch-badge">👁 ${l.watchlist_flag}</span>` : "";
  const source = l.source || "";
  const dates  = l.dates  || "";
  const addr   = l.address || "";
  const url    = l.url || "";
  const reason = l.flip_reason || "";

  return `
  <div class="${cls}">
    <div class="card-title">${l.title || "Untitled"}</div>
    <div class="card-meta">
      ${addr   ? `<span>📍 ${addr}</span>` : ""}
      ${dates  ? `<span>📅 ${dates}</span>` : ""}
      ${source ? `<span>🔗 ${source}</span>` : ""}
    </div>
    <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:4px;">
      ${saleScore} ${flipScore} ${watchBadge}
      ${reason ? `<span style="font-size:10px; color:#777;">${reason}</span>` : ""}
    </div>
    ${url ? `<a class="card-link" href="${url}" target="_blank">View listing ↗</a>` : ""}
  </div>`;
}

function renderTab() {
  const el = document.getElementById("content");
  let items = [];
  if (currentTab === "sales")     items = allListings.filter(l => l.sale_score >= 6).sort((a,b) => (b.sale_score||0)-(a.sale_score||0));
  else if (currentTab === "flips") items = allListings.filter(l => l.flip_score >= 7).sort((a,b) => (b.flip_score||0)-(a.flip_score||0));
  else if (currentTab === "watchlist") items = allListings.filter(l => l.watchlist_flag);
  else items = [...allListings].sort((a,b) => (b.sale_score||0)-(a.sale_score||0));

  if (items.length === 0) {
    el.innerHTML = `<div class="empty-state"><h3>Nothing here yet</h3><p>Try running an update.</p></div>`;
    return;
  }
  el.innerHTML = items.map(renderCard).join("");
}

function updateStats() {
  document.getElementById("statTotal").textContent = allListings.length;
  document.getElementById("statSales").textContent = allListings.filter(l => (l.sale_score||0) >= 6).length;
  document.getElementById("statFlips").textContent = allListings.filter(l => (l.flip_score||0) >= 7).length;
  document.getElementById("statWatch").textContent = allListings.filter(l => l.watchlist_flag).length;
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  renderTab();
}

async function init() {
  allListings = await loadResults();
  updateStats();
  renderTab();
  const delta = await loadDelta();
  if (delta) {
    document.getElementById("statNew").textContent = delta.count || 0;
    const ts = delta.scraped_at ? new Date(delta.scraped_at).toLocaleTimeString() : "";
    document.getElementById("lastUpdate").textContent = ts ? "Updated " + ts : "";
  }
}

async function runDelta() {
  showToast("Checking for new listings...");
  // Trigger the delta bat via studio bridge if available
  try {
    await fetch("http://localhost:11435/run-agent", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({agent: "weekend-hunter", mode: "delta"})
    });
    showToast("Delta update triggered — refreshing in 30s...");
    setTimeout(init, 30000);
  } catch {
    showToast("Run manually: weekend-hunter\\run-delta.bat");
  }
}

async function openRoute() {
  const url = await loadMapsUrl();
  if (url) {
    window.open(url.trim(), "_blank");
  } else {
    showToast("No route yet — run a full scrape first.");
  }
}

function clearResults() {
  if (confirm("Clear all results? This won't delete the data files.")) {
    allListings = [];
    updateStats();
    renderTab();
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

init();
setInterval(init, 60000); // auto-refresh every minute
</script>
</body>
</html>
