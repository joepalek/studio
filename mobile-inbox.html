<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Studio Inbox">
<meta name="theme-color" content="#0a0c10">
<title>Studio Inbox</title>
<style>
:root {
  --bg: #0a0c10;
  --panel: #0f1318;
  --border: #1e2d1e;
  --green: #39ff14;
  --green-dim: #1a7a00;
  --text: #c8d4c8;
  --text-dim: #5a6e5a;
  --amber: #ffb700;
  --red: #ff3a3a;
  --font: 'Share Tech Mono', 'Courier New', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

#app { height: 100vh; display: flex; flex-direction: column; }

/* HEADER */
#header {
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#header-title { font-size: 11px; letter-spacing: 3px; color: var(--green); }
#header-count { font-size: 10px; color: var(--text-dim); }

/* PROGRESS BAR */
#progress-wrap { padding: 8px 16px; flex-shrink: 0; }
#progress-bg { height: 3px; background: var(--border); border-radius: 2px; }
#progress-fill { height: 3px; background: var(--green); border-radius: 2px; transition: width 0.3s ease; width: 0%; }

/* CARD AREA */
#card-area {
  flex: 1; overflow: hidden; position: relative;
  display: flex; align-items: stretch;
}
.card {
  position: absolute; inset: 0;
  padding: 20px 16px 16px;
  display: flex; flex-direction: column; gap: 14px;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
  overflow-y: auto;
}
.card.active { opacity: 1; pointer-events: all; }

.card-project {
  font-size: 9px; letter-spacing: 2px; color: var(--green-dim);
  border: 1px solid var(--green-dim); display: inline-block;
  padding: 3px 8px; border-radius: 2px; align-self: flex-start;
}
.card-question {
  font-size: 15px; line-height: 1.5; color: var(--text);
}
.card-rec {
  font-size: 10px; color: var(--text-dim); border-left: 2px solid var(--green-dim);
  padding-left: 8px; line-height: 1.4;
}
.options { display: flex; flex-direction: column; gap: 8px; }
.opt-btn {
  background: var(--panel); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 12px;
  padding: 12px 14px; border-radius: 4px; text-align: left;
  cursor: pointer; transition: all 0.15s; line-height: 1.4;
}
.opt-btn:active { transform: scale(0.98); }
.opt-btn.selected { border-color: var(--green); color: var(--green); background: rgba(57,255,20,0.06); }

.custom-wrap { display: flex; gap: 8px; margin-top: 4px; }
.custom-input {
  flex: 1; background: var(--panel); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 12px;
  padding: 10px 12px; border-radius: 4px; outline: none;
}
.custom-input:focus { border-color: var(--green-dim); }
.custom-use {
  background: none; border: 1px solid var(--green-dim); color: var(--green);
  font-family: var(--font); font-size: 11px; padding: 10px 14px;
  border-radius: 4px; cursor: pointer; white-space: nowrap;
}

/* NAV */
#nav {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0;
}
.nav-btn {
  flex: 1; background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-family: var(--font); font-size: 11px;
  letter-spacing: 1px; padding: 12px; border-radius: 4px; cursor: pointer;
  transition: all 0.15s;
}
.nav-btn:active { transform: scale(0.98); }
.nav-btn.primary { border-color: var(--green-dim); color: var(--green); }
.nav-btn.disabled { opacity: 0.3; pointer-events: none; }

/* LOADING / STATUS SCREENS */
#loading, #done-screen, #submit-screen {
  position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 32px; text-align: center;
}
#loading { background: var(--bg); z-index: 10; }
.spinner {
  width: 32px; height: 32px; border: 2px solid var(--border);
  border-top-color: var(--green); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-title { font-size: 13px; letter-spacing: 2px; color: var(--green); }
.status-sub { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
#done-screen, #submit-screen { display: none; background: var(--bg); z-index: 10; }

.big-btn {
  width: 100%; background: none; border: 1px solid var(--green);
  color: var(--green); font-family: var(--font); font-size: 12px;
  letter-spacing: 2px; padding: 16px; border-radius: 4px; cursor: pointer;
}
.big-btn:active { background: rgba(57,255,20,0.1); }
.big-btn.amber { border-color: var(--amber); color: var(--amber); }

#answered-count { font-size: 28px; color: var(--green); letter-spacing: 4px; }

/* SKIPPED BADGE */
.skipped-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: 9px; letter-spacing: 1px; color: var(--amber);
  border: 1px solid rgba(255,183,0,0.4); padding: 2px 6px; border-radius: 2px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-title">// STUDIO INBOX</div>
    <div id="header-count">—</div>
  </div>
  <div id="progress-wrap">
    <div id="progress-bg"><div id="progress-fill"></div></div>
  </div>
  <div id="card-area">
    <div id="loading">
      <div class="spinner"></div>
      <div class="status-title">LOADING INBOX</div>
      <div class="status-sub">Fetching questions from studio...</div>
    </div>
    <div id="done-screen">
      <div class="status-title">ALL DONE</div>
      <div id="answered-count">0</div>
      <div class="status-sub">questions answered this session</div>
      <button class="big-btn" onclick="submitAnswers()">⬆ SUBMIT TO STUDIO</button>
      <button class="big-btn amber" style="margin-top:4px" onclick="reviewSkipped()">↩ REVIEW SKIPPED</button>
    </div>
    <div id="submit-screen">
      <div class="spinner" id="submit-spinner"></div>
      <div class="status-title" id="submit-title">SUBMITTING</div>
      <div class="status-sub" id="submit-sub">Sending answers to studio...</div>
      <button class="big-btn" id="submit-close" style="display:none" onclick="location.reload()">✓ DONE</button>
    </div>
  </div>
  <div id="nav">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">◀ PREV</button>
    <button class="nav-btn" id="btn-skip" onclick="skipQuestion()">SKIP</button>
    <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">NEXT ▶</button>
  </div>
</div>

<script>
const QUESTIONS_URL = 'https://drive.google.com/uc?export=download&id=18-dm_CTJNOdyQwt2duwOcWH7DxF1Az6r';
const SUPABASE_URL = 'https://nepnytazalthnjqpyzcx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lcG55dGF6YWx0aG5qcXB5emN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTU4MDIsImV4cCI6MjA4OTM3MTgwMn0.ojPrZ51Jei32zdL2ORJ4SOVlopfv-9mZDj-U5sDz7rw';
const SESSION_ID = 'session_' + Date.now();
const STORAGE_KEY = 'studio_inbox_answers';

let questions = [];
let current = 0;
let answers = {};
let skipped = new Set();

// Load saved answers from localStorage
function loadSaved() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) answers = JSON.parse(saved);
  } catch(e) {}
}

function saveAnswers() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(answers)); } catch(e) {}
}

async function loadQuestions() {
  loadSaved();
  try {
    const res = await fetch(QUESTIONS_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    questions = await res.json();
    if (!Array.isArray(questions)) throw new Error('Invalid format');
    init();
  } catch(e) {
    // Fallback: show error with retry
    document.getElementById('loading').innerHTML = `
      <div class="status-title" style="color:var(--red)">LOAD FAILED</div>
      <div class="status-sub">${e.message}<br><br>Check that mobile-inbox.json is publicly shared on Drive.</div>
      <button class="big-btn" style="margin-top:16px" onclick="location.reload()">↺ RETRY</button>
    `;
  }
}

function init() {
  document.getElementById('loading').style.display = 'none';
  buildCards();
  goTo(findFirstUnanswered());
  updateNav();
}

function buildCards() {
  const area = document.getElementById('card-area');
  // Remove old cards
  area.querySelectorAll('.card').forEach(c => c.remove());

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card_' + i;

    const savedAns = answers[q.id];

    let optionsHTML = '';
    if (q.options && q.options.length) {
      optionsHTML = `<div class="options">` +
        q.options.map(o => `
          <button class="opt-btn ${savedAns === o ? 'selected' : ''}"
            onclick="selectOption(${i}, this, '${o.replace(/'/g,"\\'")}')">
            ${o}
          </button>`).join('') +
        `</div>`;
    }

    card.innerHTML = `
      ${savedAns ? '<div class="skipped-badge" style="color:var(--green);border-color:rgba(57,255,20,0.4)">✓ ANSWERED</div>' : ''}
      <div class="card-project">${q.project || 'studio'}</div>
      <div class="card-question">${q.question}</div>
      ${q.recommendation ? `<div class="card-rec">💡 ${q.recommendation}</div>` : ''}
      ${optionsHTML}
      <div class="custom-wrap">
        <input class="custom-input" id="custom_${i}" type="text"
          placeholder="Custom answer..."
          value="${savedAns && !q.options?.includes(savedAns) ? savedAns : ''}"
          onkeydown="if(event.key==='Enter'){useCustom(${i})}" />
        <button class="custom-use" onclick="useCustom(${i})">USE</button>
      </div>
    `;
    area.appendChild(card);
  });
}

function selectOption(idx, btn, val) {
  const q = questions[idx];
  answers[q.id] = val;
  saveAnswers();
  // Update button states
  btn.closest('.options').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  // Clear custom input
  const ci = document.getElementById('custom_' + idx);
  if (ci) ci.value = '';
  // Update answered badge
  updateAnsweredBadge(idx);
  updateHeader();
}

function useCustom(idx) {
  const ci = document.getElementById('custom_' + idx);
  const val = ci ? ci.value.trim() : '';
  if (!val) return;
  const q = questions[idx];
  answers[q.id] = val;
  saveAnswers();
  // Deselect preset buttons
  const card = document.getElementById('card_' + idx);
  card.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  updateAnsweredBadge(idx);
  updateHeader();
}

function updateAnsweredBadge(idx) {
  const card = document.getElementById('card_' + idx);
  let badge = card.querySelector('.skipped-badge');
  if (!badge) {
    badge = document.createElement('div');
    badge.className = 'skipped-badge';
    card.insertBefore(badge, card.firstChild);
  }
  badge.style.color = 'var(--green)';
  badge.style.borderColor = 'rgba(57,255,20,0.4)';
  badge.textContent = '✓ ANSWERED';
}

function skipQuestion() {
  skipped.add(current);
  navigate(1);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= questions.length) {
    if (dir === 1) showDone();
    return;
  }
  goTo(next);
}

function goTo(idx) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card_' + idx);
  if (card) card.classList.add('active');
  current = idx;
  updateNav();
  updateHeader();
}

function findFirstUnanswered() {
  for (let i = 0; i < questions.length; i++) {
    if (!answers[questions[i].id]) return i;
  }
  return 0;
}

function updateNav() {
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  if (prev) prev.classList.toggle('disabled', current === 0);
  if (next) next.textContent = current === questions.length - 1 ? 'FINISH ▶' : 'NEXT ▶';
}

function updateHeader() {
  const answeredCount = Object.keys(answers).length;
  document.getElementById('header-count').textContent = `${answeredCount}/${questions.length} answered`;
  document.getElementById('progress-fill').style.width = (questions.length ? (answeredCount / questions.length * 100) : 0) + '%';
}

function showDone() {
  const answeredCount = Object.keys(answers).length;
  document.getElementById('answered-count').textContent = answeredCount;
  document.getElementById('done-screen').style.display = 'flex';
}

function reviewSkipped() {
  document.getElementById('done-screen').style.display = 'none';
  // Find first unanswered
  const idx = findFirstUnanswered();
  goTo(idx);
}

async function submitAnswers() {
  document.getElementById('done-screen').style.display = 'none';
  document.getElementById('submit-screen').style.display = 'flex';

  const payload = {
    session_id: SESSION_ID,
    answers: answers,
    submitted_at: new Date().toISOString(),
    total_answered: Object.keys(answers).length
  };

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/mobile_answers`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }

    // Clear localStorage on success
    localStorage.removeItem(STORAGE_KEY);

    document.getElementById('submit-spinner').style.display = 'none';
    document.getElementById('submit-title').textContent = '✓ SUBMITTED';
    document.getElementById('submit-sub').textContent = `${Object.keys(answers).length} answers sent to studio.\nHit Refresh in studio to apply them.`;
    document.getElementById('submit-close').style.display = 'block';

  } catch(e) {
    document.getElementById('submit-spinner').style.display = 'none';
    document.getElementById('submit-title').style.color = 'var(--amber)';
    document.getElementById('submit-title').textContent = 'SUBMIT FAILED';
    document.getElementById('submit-sub').textContent = e.message + '\n\nAnswers are saved locally — try again.';
    document.getElementById('submit-close').style.display = 'block';
    document.getElementById('submit-close').textContent = '↺ TRY AGAIN';
    document.getElementById('submit-close').onclick = submitAnswers;
  }
}

// Touch/swipe support
let touchStartX = 0;
document.getElementById('card-area').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('card-area').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 60) navigate(diff > 0 ? 1 : -1);
}, { passive: true });

// Start
loadQuestions();
</script>
</body>
</html>
