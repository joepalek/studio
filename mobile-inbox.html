<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Studio Inbox">
<meta name="theme-color" content="#0a0c10">
<title>Studio Inbox</title>
<style>
:root {
  --bg: #0a0c10;
  --panel: #0f1318;
  --border: #1e2d1e;
  --green: #39ff14;
  --green-dim: #1a7a00;
  --text: #c8d4c8;
  --text-dim: #5a6e5a;
  --amber: #ffb700;
  --amber-dim: #7a5500;
  --red: #ff3a3a;
  --purple: #c084fc;
  --blue: #00d4ff;
  --font: 'Share Tech Mono', 'Courier New', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

/* HEADER */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px 6px;
}
#header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
#header-title { font-size: 11px; letter-spacing: 3px; color: var(--green); }
#header-stats { font-size: 10px; color: var(--text-dim); }
#progress-bg { height: 2px; background: var(--border); border-radius: 2px; }
#progress-fill { height: 2px; background: var(--green); border-radius: 2px; transition: width 0.3s; width: 0%; }

/* FILTER TABS */
#filters {
  position: fixed; top: 52px; left: 0; right: 0; z-index: 100;
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; gap: 0; overflow-x: auto; padding: 0 8px;
}
#filters::-webkit-scrollbar { display: none; }
.filter-tab {
  font-size: 9px; letter-spacing: 1px; color: var(--text-dim);
  padding: 8px 12px; cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; transition: all 0.15s;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font);
}
.filter-tab.active { color: var(--green); border-bottom-color: var(--green); }

/* INBOX LIST */
#inbox-list {
  margin-top: 90px;
  padding: 8px 10px 120px;
}

/* ITEM */
.inbox-item {
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 6px;
  background: var(--panel);
  overflow: hidden;
  transition: border-color 0.15s;
}
.inbox-item.answered { border-color: rgba(57,255,20,0.3); }
.inbox-item.expanded { border-color: var(--green-dim); }

.item-header {
  padding: 10px 12px;
  cursor: pointer;
  display: flex; align-items: flex-start; gap: 8px;
}
.item-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0; margin-top: 4px;
}
.dot-decision { background: var(--amber); }
.dot-proactive { background: var(--purple); }
.dot-answered { background: var(--green); }

.item-content { flex: 1; min-width: 0; }
.item-question {
  font-size: 12px; line-height: 1.4; color: var(--text);
  margin-bottom: 4px;
}
.item-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.item-project {
  font-size: 9px; letter-spacing: 1px; color: var(--text-dim);
  border: 1px solid var(--border); padding: 1px 5px; border-radius: 2px;
}
.item-type {
  font-size: 9px; letter-spacing: 1px; padding: 1px 5px; border-radius: 2px; border: 1px solid;
}
.type-decision { color: var(--amber); border-color: var(--amber-dim); }
.type-proactive { color: var(--purple); border-color: rgba(192,132,252,0.3); }
.item-answer-preview {
  font-size: 10px; color: var(--green); margin-top: 4px;
}

/* EXPANDED PANEL */
.item-expand {
  display: none; padding: 0 12px 12px;
  border-top: 1px solid var(--border);
}
.item-expand.open { display: block; }
.item-rec {
  font-size: 10px; color: var(--text-dim);
  border-left: 2px solid var(--green-dim);
  padding: 6px 8px; margin: 10px 0 8px;
  line-height: 1.4;
}
.options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.opt-btn {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 11px;
  padding: 10px 12px; border-radius: 3px; text-align: left;
  cursor: pointer; transition: all 0.15s; line-height: 1.4;
}
.opt-btn.selected { border-color: var(--green); color: var(--green); background: rgba(57,255,20,0.05); }
.custom-wrap { display: flex; gap: 6px; margin-top: 4px; }
.custom-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 11px;
  padding: 9px 10px; border-radius: 3px; outline: none;
}
.custom-input:focus { border-color: var(--green-dim); }
.custom-use {
  background: none; border: 1px solid var(--green-dim); color: var(--green);
  font-family: var(--font); font-size: 10px; padding: 9px 12px;
  border-radius: 3px; cursor: pointer;
}

/* BOTTOM BAR */
#bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: 1px solid var(--border);
  padding: 10px 14px 20px;
}
#submit-btn {
  width: 100%; background: none; border: 1px solid var(--green);
  color: var(--green); font-family: var(--font); font-size: 11px;
  letter-spacing: 2px; padding: 13px; border-radius: 4px; cursor: pointer;
}
#submit-btn:disabled { opacity: 0.3; border-color: var(--border); color: var(--text-dim); }

/* OVERLAY SCREENS */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: var(--bg); flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 32px; text-align: center;
}
.overlay.show { display: flex; }
.spinner {
  width: 32px; height: 32px; border: 2px solid var(--border);
  border-top-color: var(--green); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.ov-title { font-size: 13px; letter-spacing: 3px; }
.ov-sub { font-size: 11px; color: var(--text-dim); line-height: 1.6; }
.ov-btn {
  width: 100%; background: none; border: 1px solid var(--green);
  color: var(--green); font-family: var(--font); font-size: 11px;
  letter-spacing: 2px; padding: 14px; border-radius: 4px; cursor: pointer;
  margin-top: 4px;
}
.ov-btn.amber { border-color: var(--amber); color: var(--amber); }
#answered-big { font-size: 40px; color: var(--green); letter-spacing: 6px; }

/* SECTION LABELS */
.section-label {
  font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
  padding: 10px 4px 4px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

<div id="header">
  <div id="header-top">
    <div id="header-title">// STUDIO INBOX</div>
    <div id="header-stats">—</div>
  </div>
  <div id="progress-bg"><div id="progress-fill"></div></div>
</div>

<div id="filters">
  <button class="filter-tab active" onclick="setFilter('all')">ALL</button>
  <button class="filter-tab" onclick="setFilter('decision')">DECIDE</button>
  <button class="filter-tab" onclick="setFilter('proactive')">PROACT</button>
  <button class="filter-tab" onclick="setFilter('unanswered')">PENDING</button>
  <button class="filter-tab" onclick="setFilter('answered')">DONE</button>
</div>

<div id="inbox-list"></div>

<div id="bottom-bar">
  <button id="submit-btn" onclick="showDone()" disabled>
    ⬆ SUBMIT ANSWERS TO STUDIO
  </button>
</div>

<!-- Loading -->
<div class="overlay show" id="loading-screen">
  <div class="spinner"></div>
  <div class="ov-title" style="color:var(--green)">LOADING INBOX</div>
  <div class="ov-sub">Fetching questions...</div>
</div>

<!-- Done / Submit -->
<div class="overlay" id="done-screen">
  <div class="ov-title" style="color:var(--green)">ANSWERS READY</div>
  <div id="answered-big">0</div>
  <div class="ov-sub" id="done-sub">questions answered this session</div>
  <button class="ov-btn" onclick="submitAnswers()">⬆ SEND TO STUDIO</button>
  <button class="ov-btn amber" onclick="hideDone()">↩ KEEP ANSWERING</button>
</div>

<!-- Submitting -->
<div class="overlay" id="submit-screen">
  <div class="spinner" id="sub-spinner"></div>
  <div class="ov-title" id="sub-title" style="color:var(--green)">SUBMITTING</div>
  <div class="ov-sub" id="sub-sub">Sending to studio...</div>
  <button class="ov-btn" id="sub-close" style="display:none" onclick="location.reload()">✓ DONE</button>
</div>

<script>
const SUPABASE_URL = 'https://nepnytazalthnjqpyzcx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lcG55dGF6YWx0aG5qcXB5emN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTU4MDIsImV4cCI6MjA4OTM3MTgwMn0.ojPrZ51Jei32zdL2ORJ4SOVlopfv-9mZDj-U5sDz7rw';
const STORAGE_KEY = 'studio_inbox_v2';
const SESSION_ID = 'mob_' + Date.now();

let questions = [];
let answers = {};
let currentFilter = 'all';
let expandedId = null;

// ── QUESTIONS (embedded) ──────────────────────────────────────────
// Will be replaced by Claude Code with actual mobile-inbox.json contents
const EMBEDDED_QUESTIONS = [{"id":"acuscana-d001","project":"acuscan-ar","question":"Use WebXR or Canvas overlay for AR rendering?","options":["WebXR","Canvas overlay on video element"],"type":"decision","recommendation":"Canvas overlay -- broader mobile browser support, simpler implementation for MVP"},{"id":"acuscana-p001","project":"acuscan-ar","question":"If hand tracking lags on older phones -- prioritize speed or visual accuracy?","options":[],"type":"question"},{"id":"acuscana-p002","project":"acuscan-ar","question":"Should point descriptions be text overlaid on screen or a separate info panel below the camera?","options":[],"type":"question"},{"id":"acuscana-p003","project":"acuscan-ar","question":"Eventually monetize this or keep it free/personal?","options":[],"type":"question"},{"id":"arbitrag-d001","project":"arbitrage-pulse","question":"What geographic area to monitor -- Tennessee local, Illinois local, or both?","options":["Tennessee (Atwood/McKenzie area)","Illinois (Woodstock area)","Both -- separate digests"],"type":"decision","recommendation":"Both with separate digests -- you travel between both regularly"},{"id":"arbitrag-d002","project":"arbitrage-pulse","question":"Scraping approach -- Apify Actor or direct browser automation via Chrome extension?","options":["Apify (paid, reliable, maintained)","Chrome extension automation (free, may break with FB updates)"],"type":"decision","recommendation":"Start with Chrome extension automation -- free, and we already have it set up"},{"id":"arbitrag-p001","project":"arbitrage-pulse","question":"What categories do you want to monitor? (e.g. tools, electronics, collectibles, furniture, vintage)","options":[],"type":"question"},{"id":"arbitrag-p002","project":"arbitrage-pulse","question":"Minimum profit margin to include in digest -- e.g. only show items with 40%+ margin?","options":[],"type":"question"},{"id":"arbitrag-p003","project":"arbitrage-pulse","question":"Digest delivery format -- Markdown file in Drive, email, or dashboard card?","options":[],"type":"question"},{"id":"hibidana-d001","project":"hibid-analyzer","question":"Now that Chrome extension is available -- attempt textarea via extension first or continue investigating DOM approach?","options":["Extension first -- highest probability of success","DOM investigation -- understand root cause first","Both in parallel"],"type":"decision","recommendation":"Extension first -- Claude in Chrome has direct page access, bypasses the DOM isolation problem entirely"},{"id":"hibidana-p001","project":"hibid-analyzer","question":"Should analysis run on all lots automatically or only when you click a button on a specific lot?","options":[],"type":"question"},{"id":"hibidana-p002","project":"hibid-analyzer","question":"What format do you want the watchlist notes in? (e.g. 'Est: $45-65 | Condition: Good | Items: ceramic vase')","options":[],"type":"question"},{"id":"hibidana-p003","project":"hibid-analyzer","question":"Should this work on mobile Chrome or desktop only?","options":[],"type":"question"},{"id":"jobmatch-p001","project":"job-match","question":"Should the platform be offered as SaaS to other job seekers or stay personal/portfolio use?","options":[],"type":"question"},{"id":"jobmatch-p002","project":"job-match","question":"Should employer portal be prioritized before or after scraping engine?","options":[],"type":"question"},{"id":"jobmatch-p003","project":"job-match","question":"For the scam database -- should it be private to your platform or eventually shared/open source?","options":[],"type":"question"},{"id":"jobmatch-p004","project":"job-match","question":"Should job ratings be shown to users in v1 or held back until v2?","options":[],"type":"question"},{"id":"listingo-d001","project":"listing-optimizer","question":"Personal tool only or productize for other sellers?","options":["Personal only -- optimize Joe's 572 listings","Beta test with select sellers","Full SaaS product"],"type":"decision","recommendation":"Personal first -- prove it works on your own inventory, then decide"},{"id":"listingo-d002","project":"listing-optimizer","question":"Input format -- eBay bulk export CSV or manual entry or both?","options":["eBay bulk export CSV only","Manual entry only","Both"],"type":"decision","recommendation":"eBay bulk export CSV -- you already have 572 listings to process"},{"id":"listingo-p001","project":"listing-optimizer","question":"What are your SKU prefix conventions for physical storage location tracking?","options":[],"type":"question"},{"id":"listingo-p002","project":"listing-optimizer","question":"Which categories make up the majority of your 572 listings?","options":[],"type":"question"},{"id":"listingo-p003","project":"listing-optimizer","question":"Should the optimizer suggest a price adjustment based on recent eBay sold data?","options":[],"type":"question"},{"id":"nutrimin-d001","project":"nutrimind","question":"What defines NutriMind as complete -- what is the finish line?","options":["All planned features working","Personal use ready","Productize for other users"],"type":"decision","recommendation":"Define personal use ready first -- then decide if productizing is worth the extra work"},{"id":"nutrimin-p001","project":"nutrimind","question":"Should shopping list generation be part of the MVP or post-launch?","options":[],"type":"question"},{"id":"nutrimin-p002","project":"nutrimind","question":"Should the app remember your meal history to avoid repeating recent meals?","options":[],"type":"question"},{"id":"squeezee-d001","project":"squeeze-empire","question":"What defines late-game completion -- what is the win condition or final milestone?","options":["Reach a revenue target","Unlock all upgrades","No win condition -- infinite idle","Story ending"],"type":"decision","recommendation":"Reach a revenue target + unlock all upgrades -- gives clear progression and satisfying endpoint"},{"id":"squeezee-p001","project":"squeeze-empire","question":"Should the game save state between sessions or reset each time?","options":[],"type":"question"},{"id":"squeezee-p002","project":"squeeze-empire","question":"After late-game is done -- release publicly, keep personal, or productize?","options":[],"type":"question"},{"id":"whatnota-d001","project":"whatnot-apps","question":"Which Whatnot role to prioritize for application submission first?","options":["Fraud Agent","Trust & Safety Agent","CX Agent Overnight"],"type":"decision","recommendation":"Trust & Safety Agent -- best alignment with moderation background and written communication preference"},{"id":"whatnota-p001","project":"whatnot-apps","question":"Do you have the actual current Whatnot job posting URLs to tailor against?","options":[],"type":"question"},{"id":"whatnota-p002","project":"whatnot-apps","question":"Should we build a general Whatnot cover letter or three separate role-specific ones?","options":[],"type":"question"}];

function loadSaved() {
  try { answers = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}
}
function saveAnswers() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(answers)); } catch(e) {}
}

async function init() {
  loadSaved();
  if (EMBEDDED_QUESTIONS) {
    questions = EMBEDDED_QUESTIONS;
    render();
  } else {
    showError('Questions not embedded. Ask Claude Code to run the embed step.');
  }
}

function showError(msg) {
  document.getElementById('loading-screen').innerHTML = `
    <div class="ov-title" style="color:var(--red)">LOAD FAILED</div>
    <div class="ov-sub">${msg}</div>
    <button class="ov-btn" onclick="location.reload()">↺ RETRY</button>
  `;
}

function render() {
  document.getElementById('loading-screen').classList.remove('show');
  updateHeader();
  renderList();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach((t,i) => {
    t.classList.toggle('active', ['all','decision','proactive','unanswered','answered'][i] === f);
  });
  renderList();
}

function getFiltered() {
  return questions.filter(q => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'answered') return !!answers[q.id];
    if (currentFilter === 'unanswered') return !answers[q.id];
    return q.type === currentFilter;
  });
}

function renderList() {
  const list = document.getElementById('inbox-list');
  const filtered = getFiltered();

  if (!filtered.length) {
    list.innerHTML = `<div style="text-align:center;color:var(--text-dim);font-size:11px;padding:40px">No items</div>`;
    return;
  }

  // Group by project
  const byProject = {};
  filtered.forEach(q => {
    if (!byProject[q.project]) byProject[q.project] = [];
    byProject[q.project].push(q);
  });

  let html = '';
  Object.entries(byProject).forEach(([proj, items]) => {
    html += `<div class="section-label">${proj.toUpperCase()}</div>`;
    items.forEach(q => {
      const ans = answers[q.id];
      const isExpanded = expandedId === q.id;
      const dotClass = ans ? 'dot-answered' : (q.type === 'decision' ? 'dot-decision' : 'dot-proactive');
      const typeLabel = q.type === 'decision' ? 'DECISION' : 'PROACT';
      const typeClass = q.type === 'decision' ? 'type-decision' : 'type-proactive';

      let optionsHTML = '';
      if (q.options && q.options.length) {
        optionsHTML = `<div class="options">` +
          q.options.map(o => `
            <button class="opt-btn ${ans === o ? 'selected' : ''}"
              onclick="selectOpt('${q.id}','${o.replace(/'/g,"\\'")}',this)">
              ${o}
            </button>`).join('') +
          `</div>`;
      }

      html += `
        <div class="inbox-item ${ans ? 'answered' : ''} ${isExpanded ? 'expanded' : ''}" id="item_${q.id}">
          <div class="item-header" onclick="toggleItem('${q.id}')">
            <div class="item-dot ${dotClass}"></div>
            <div class="item-content">
              <div class="item-question">${q.question}</div>
              <div class="item-meta">
                <span class="item-project">${q.project}</span>
                <span class="item-type ${typeClass}">${typeLabel}</span>
              </div>
              ${ans ? `<div class="item-answer-preview">✓ ${ans}</div>` : ''}
            </div>
          </div>
          <div class="item-expand ${isExpanded ? 'open' : ''}" id="expand_${q.id}">
            ${q.recommendation ? `<div class="item-rec">💡 ${q.recommendation}</div>` : ''}
            ${optionsHTML}
            <div class="custom-wrap">
              <input class="custom-input" id="custom_${q.id}" type="text"
                placeholder="Custom answer..."
                value="${ans && !q.options?.includes(ans) ? ans : ''}" />
              <button class="custom-use" onclick="useCustom('${q.id}')">USE</button>
            </div>
          </div>
        </div>`;
    });
  });

  list.innerHTML = html;
}

function toggleItem(id) {
  expandedId = expandedId === id ? null : id;
  renderList();
  if (expandedId) {
    setTimeout(() => {
      const el = document.getElementById('item_' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

function selectOpt(id, val, btn) {
  answers[id] = val;
  saveAnswers();
  // Update UI without full re-render
  const item = document.getElementById('item_' + id);
  if (item) {
    item.classList.add('answered');
    item.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    // Update preview
    let preview = item.querySelector('.item-answer-preview');
    if (!preview) {
      preview = document.createElement('div');
      preview.className = 'item-answer-preview';
      item.querySelector('.item-meta').after(preview);
    }
    preview.textContent = '✓ ' + val;
  }
  updateHeader();
  // Auto-close and move to next unanswered
  setTimeout(() => {
    const unanswered = questions.filter(q => !answers[q.id]);
    if (unanswered.length > 0) {
      expandedId = unanswered[0].id;
      renderList();
      setTimeout(() => {
        const el = document.getElementById('item_' + unanswered[0].id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    } else {
      expandedId = null;
      renderList();
    }
  }, 400);
}

function useCustom(id) {
  const input = document.getElementById('custom_' + id);
  const val = input ? input.value.trim() : '';
  if (!val) return;
  answers[id] = val;
  saveAnswers();
  // Fake button for selectOpt reuse
  const fakeBtn = { classList: { remove: ()=>{}, add: ()=>{} } };
  updateHeader();
  renderList();
}

function updateHeader() {
  const total = questions.length;
  const answered = Object.keys(answers).length;
  document.getElementById('header-stats').textContent = `${answered}/${total} answered`;
  document.getElementById('progress-fill').style.width = (total ? answered/total*100 : 0) + '%';
  const btn = document.getElementById('submit-btn');
  btn.disabled = answered === 0;
  btn.textContent = answered > 0
    ? `⬆ SUBMIT ${answered} ANSWER${answered > 1 ? 'S' : ''} TO STUDIO`
    : '⬆ SUBMIT ANSWERS TO STUDIO';
}

function showDone() {
  const answered = Object.keys(answers).length;
  document.getElementById('answered-big').textContent = answered;
  document.getElementById('done-sub').textContent = `question${answered !== 1 ? 's' : ''} answered this session`;
  document.getElementById('done-screen').classList.add('show');
}

function hideDone() {
  document.getElementById('done-screen').classList.remove('show');
}

async function submitAnswers() {
  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('submit-screen').classList.add('show');

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/mobile_answers`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        session_id: SESSION_ID,
        answers: answers,
        total_answered: Object.keys(answers).length
      })
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);

    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('sub-spinner').style.display = 'none';
    document.getElementById('sub-title').textContent = '✓ SUBMITTED';
    document.getElementById('sub-sub').textContent =
      `${Object.keys(answers).length} answers sent.\nHit Refresh in studio to apply.`;
    document.getElementById('sub-close').style.display = 'block';

  } catch(e) {
    document.getElementById('sub-spinner').style.display = 'none';
    document.getElementById('sub-title').style.color = 'var(--amber)';
    document.getElementById('sub-title').textContent = 'SUBMIT FAILED';
    document.getElementById('sub-sub').textContent = e.message + '\n\nAnswers saved locally.';
    document.getElementById('sub-close').style.display = 'block';
    document.getElementById('sub-close').textContent = '↺ RETRY';
    document.getElementById('sub-close').onclick = submitAnswers;
  }
}

init();
</script>
</body>
</html>
